version: 2

project_name: claw-memory-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: claw-memory-tui
    dir: tui
    binary: claw-memory-tui
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: claw-memory-tui
    builds:
      - claw-memory-tui
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: tuantabit
    name: claw-memory
  draft: false
  prerelease: auto
  name_template: "claw-memory-tui v{{ .Version }}"
